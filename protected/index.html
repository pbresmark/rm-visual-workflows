<title>ResmarkWeb — Website Build Workflow</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Source Sans Pro', -apple-system, sans-serif;
    background: #f7f8fa; color: #0F1922;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .lock-box {
    background: #fff; border-radius: 20px; padding: 3rem 2.5rem; text-align: center;
    box-shadow: 0 4px 24px rgba(15,25,34,0.08); max-width: 420px; width: 90%;
  }
  .lock-logo { height: 36px; margin-bottom: 1.2rem; }
  .lock-title { font-size: 1.4rem; font-weight: 900; margin-bottom: 0.3rem; }
  .lock-title span { color: #F3711D; }
  .lock-sub { font-size: 0.88rem; color: #6b7a8a; margin-bottom: 1.5rem; line-height: 1.4; }
  .lock-input {
    width: 100%; padding: 0.8rem 1rem; font-size: 1rem; font-family: inherit;
    border: 2px solid #dde1e6; border-radius: 10px; outline: none;
    transition: border-color 0.15s; margin-bottom: 0.8rem;
  }
  .lock-input:focus { border-color: #F3711D; }
  .lock-btn {
    width: 100%; padding: 0.8rem; font-size: 1rem; font-weight: 700; font-family: inherit;
    background: #F3711D; color: #fff; border: none; border-radius: 10px;
    cursor: pointer; transition: background 0.15s;
  }
  .lock-btn:hover { background: #e06010; }
  .lock-error {
    color: #d63031; font-size: 0.82rem; font-weight: 600; margin-top: 0.6rem;
    display: none;
  }
  .lock-icon { font-size: 3rem; margin-bottom: 0.8rem; }
</style>

async function deriveKey(password, saltB64) {
  const salt = Uint8Array.from(atob(saltB64), c => c.charCodeAt(0));
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
}

async function decrypt() {
  const pw = document.getElementById('pwInput').value;
  const errEl = document.getElementById('errorMsg');
  errEl.style.display = 'none';

  try {
    const key = await deriveKey(pw, PAYLOAD.salt);
    const nonce = Uint8Array.from(atob(PAYLOAD.nonce), c => c.charCodeAt(0));
    const ct = Uint8Array.from(atob(PAYLOAD.ct), c => c.charCodeAt(0));

    const decrypted = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: nonce },
      key,
      ct
    );

    const html = new TextDecoder().decode(decrypted);
    document.open();
    document.write(html);
    document.close();
  } catch (e) {
    errEl.style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}
</script>
